<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>agustina reynoso — recetas de autora</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Caveat:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF5EF;
    --cream-2: #F5EEE5;
    --pink-1: #F7E2DE;
    --pink-2: #F3D2CC;
    --pink-3: #E9B6AE;
    --rose:   #C97B7B;
    --beige:  #E8D9C5;
    --beige-d:#C9B5A0;
    --ink:    #3D2E2A;
    --ink-2:  #6B5953;
    --ink-3:  #9A8880;
    --line:   #E7DBCE;
    --serif:  "Cormorant Garamond", "Times New Roman", serif;
    --hand:   "Caveat", cursive;
    --sans:   "Manrope", -apple-system, system-ui, sans-serif;
    --mono:   "JetBrains Mono", ui-monospace, monospace;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  img { max-width: 100%; display: block; }
  h1,h2,h3,h4 { margin: 0; font-weight: 400; }

  /* ---------- top bar ---------- */
  .topbar {
    background: var(--ink);
    color: var(--cream);
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    text-align: center;
    padding: 10px 16px;
    font-weight: 500;
  }
  .topbar span { opacity: .7; margin: 0 14px; }

  /* ---------- nav ---------- */
  nav.head {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 22px 56px;
    border-bottom: 1px solid var(--line);
    background: var(--cream);
    position: sticky; top: 0; z-index: 30;
  }
  nav.head ul {
    list-style: none; padding: 0; margin: 0;
    display: flex; gap: 34px;
    font-size: 13px; letter-spacing: .04em;
  }
  nav.head ul.right { justify-content: flex-end; }
  nav.head a { color: var(--ink-2); transition: color .2s; }
  nav.head a:hover { color: var(--rose); }
  .brand {
    font-family: var(--serif);
    font-size: 30px;
    font-style: italic;
    letter-spacing: .01em;
    color: var(--ink);
    line-height: 1;
  }
  .brand .dot { color: var(--rose); }
  .nav-cart {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px; letter-spacing: .08em;
    background: var(--cream);
    transition: background .2s, border-color .2s;
  }
  .nav-cart:hover { background: var(--pink-1); border-color: var(--pink-2); }
  .nav-cart .count {
    background: var(--rose); color: var(--cream);
    border-radius: 999px; min-width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; padding: 0 5px;
  }

  /* ---------- hero ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    padding: 72px 56px 80px;
    align-items: center;
    background:
      radial-gradient(ellipse 60% 70% at 85% 20%, var(--pink-1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 10% 90%, var(--cream-2) 0%, transparent 60%),
      var(--cream);
  }
  .hero-left { padding: 0; }
  .hero-right { padding: 0; }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .hero-eyebrow .pip {
    width: 6px; height: 6px; border-radius: 50%; background: var(--rose);
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(56px, 6.4vw, 92px);
    line-height: 0.98;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic;
    color: var(--rose);
    font-weight: 400;
  }
  .hero h1 .scribble {
    font-family: var(--hand);
    font-style: normal;
    color: var(--rose);
    font-size: .68em;
    display: inline-block;
    transform: rotate(-3deg) translateY(-.04em);
    margin-left: .1em;
  }
  .hero p.lede {
    margin-top: 26px;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-2);
    max-width: 460px;
  }
  .hero-cta {
    margin-top: 36px;
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform .25s, background .25s, color .25s, border-color .25s;
  }
  .btn-primary {
    background: var(--ink); color: var(--cream);
  }
  .btn-primary:hover { background: var(--rose); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink);
  }
  .btn-ghost:hover { background: var(--ink); color: var(--cream); }
  .btn .arr { transition: transform .25s; }
  .btn:hover .arr { transform: translateX(4px); }

  .hero-stats {
    margin-top: 56px;
    display: grid; grid-template-columns: repeat(3, auto);
    gap: 44px;
    font-family: var(--serif);
  }
  .hero-stats .num {
    font-size: 36px; font-style: italic; color: var(--ink); line-height: 1;
  }
  .hero-stats .lbl {
    font-family: var(--sans);
    font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-3);
    margin-top: 8px;
  }

  /* ---------- hero photo ---------- */
  .hero-photo {
    position: relative;
    aspect-ratio: 4/5;
    border-radius: 8px;
    overflow: visible;
  }
  .photo {
    width: 100%; height: 100%;
    border-radius: 6px;
    background-image:
      repeating-linear-gradient(135deg, rgba(201,123,123,.08) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--pink-1) 0%, var(--pink-2) 100%);
    border: 1px solid var(--pink-2);
    display: flex; align-items: flex-end; justify-content: flex-start;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .photo .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--rose);
    background: rgba(255,255,255,.7);
    padding: 6px 10px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }
  .photo.beige {
    background-image:
      repeating-linear-gradient(135deg, rgba(61,46,42,.05) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--beige) 0%, #DBC8B0 100%);
    border-color: var(--beige-d);
  }
  .photo.beige .label { color: var(--ink); }
  .photo.cream {
    background-image:
      repeating-linear-gradient(135deg, rgba(61,46,42,.04) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    border-color: var(--line);
  }
  .photo.cream .label { color: var(--ink-2); }
  .photo.rose {
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.18) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--pink-3) 0%, var(--rose) 100%);
    border-color: var(--rose);
  }
  .photo.rose .label { color: #fff; background: rgba(0,0,0,.18); }

  .hero-tag {
    position: absolute;
    top: 28px; left: -28px;
    font-family: var(--hand);
    font-size: 30px;
    color: var(--ink);
    transform: rotate(-6deg);
    background: var(--cream);
    padding: 4px 14px;
    border-radius: 4px;
    box-shadow: 0 1px 0 var(--line);
  }
  .hero-badge {
    position: absolute;
    bottom: -32px; right: -22px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--cream);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.15;
    transform: rotate(-8deg);
    animation: spin 22s linear infinite;
  }
  .hero-badge span { display: block; font-family: var(--sans); font-style: normal; font-size: 9px; letter-spacing: .25em; text-transform: uppercase; opacity: .7; margin-top: 4px; }
  @keyframes spin {
    from { transform: rotate(-8deg); }
    50%  { transform: rotate(8deg); }
    to   { transform: rotate(-8deg); }
  }

  /* ---------- marquee ---------- */
  .marquee {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--cream-2);
    overflow: hidden;
    padding: 18px 0;
    font-family: var(--serif);
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    white-space: nowrap;
  }
  .marquee-track {
    display: inline-block;
    animation: scroll 40s linear infinite;
  }
  .marquee-track span { margin: 0 28px; }
  .marquee-track .star { color: var(--rose); font-style: normal; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ---------- section header ---------- */
  section { padding: 96px 56px; }
  .sec-head {
    display: flex; align-items: end; justify-content: space-between;
    margin-bottom: 48px; gap: 40px;
  }
  .sec-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .sec-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(40px, 4.4vw, 60px);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .sec-title em { font-style: italic; color: var(--rose); }
  .sec-link {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 4px;
    display: inline-flex; gap: 8px; align-items: center;
  }
  .sec-link:hover { color: var(--rose); border-color: var(--rose); }

  /* ---------- categories ---------- */
  .chips {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 36px;
  }
  .chip {
    padding: 9px 18px; border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--cream);
    font-size: 12px; letter-spacing: .06em;
    color: var(--ink-2);
    transition: all .2s;
  }
  .chip:hover { border-color: var(--rose); color: var(--rose); }
  .chip.active {
    background: var(--ink); color: var(--cream); border-color: var(--ink);
  }
  .chip .ct { opacity: .55; margin-left: 6px; font-size: 11px; }

  /* ---------- recipes grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px 28px;
  }
  .card {
    cursor: pointer;
    position: relative;
  }
  .card-photo-wrap {
    position: relative;
    aspect-ratio: 4/5;
    overflow: hidden;
    border-radius: 6px;
  }
  .card-photo-wrap .photo {
    transition: transform .8s ease;
  }
  .card:hover .card-photo-wrap .photo { transform: scale(1.04); }
  .card-add {
    position: absolute; right: 14px; bottom: 14px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--cream);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 6px 20px rgba(61,46,42,.12);
    opacity: 0; transform: translateY(8px);
    transition: opacity .25s, transform .25s, background .2s, color .2s;
  }
  .card:hover .card-add { opacity: 1; transform: translateY(0); }
  .card-add:hover { background: var(--rose); color: var(--cream); }
  .card-bookmark {
    position: absolute; top: 14px; right: 14px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--ink-2);
    transition: color .2s, background .2s;
  }
  .card-bookmark:hover { color: var(--rose); }
  .card-bookmark.saved { color: var(--rose); background: var(--cream); }
  .card-tag {
    position: absolute; top: 14px; left: 14px;
    font-family: var(--mono);
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    background: rgba(255,255,255,.85); backdrop-filter: blur(4px);
    color: var(--ink); padding: 5px 9px; border-radius: 3px;
  }
  .card-tag.new { background: var(--rose); color: var(--cream); }
  .card-meta {
    margin-top: 16px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px;
  }
  .card-title {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.005em;
  }
  .card-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: .04em;
    display: flex; gap: 10px; align-items: center;
  }
  .card-sub .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-3); display: inline-block; }
  .card-price {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink);
    font-style: italic;
    white-space: nowrap;
  }

  /* ---------- about ---------- */
  .about {
    background: var(--cream-2);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .about-grid {
    display: grid;
    grid-template-columns: .9fr 1.1fr;
    gap: 72px;
    align-items: center;
  }
  .about-photo {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 6px;
  }
  .about-photo .photo { border-radius: 6px; }
  .about-stamp {
    position: absolute; bottom: -22px; left: -22px;
    background: var(--cream); border: 1px solid var(--line);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: var(--hand);
    font-size: 24px;
    color: var(--ink);
    box-shadow: 0 8px 20px rgba(61,46,42,.06);
  }
  .about h2 {
    font-family: var(--serif); font-weight: 300;
    font-size: clamp(40px, 4.4vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .about h2 em { font-style: italic; color: var(--rose); }
  .about p {
    margin-top: 24px;
    font-size: 16px; color: var(--ink-2); line-height: 1.7;
    max-width: 500px;
  }
  .signature {
    margin-top: 28px;
    font-family: var(--hand);
    font-size: 38px;
    color: var(--ink);
  }

  /* ---------- bundle / featured ---------- */
  .bundle {
    background: var(--ink);
    color: var(--cream);
    border-radius: 12px;
    padding: 64px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 56px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .bundle::after {
    content: "";
    position: absolute; right: -120px; top: -120px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(247,226,222,.15) 0%, transparent 70%);
  }
  .bundle .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .25em;
    color: var(--pink-2);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .bundle h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(36px, 4.2vw, 56px);
    line-height: 1.02;
    letter-spacing: -0.01em;
  }
  .bundle h2 em { font-style: italic; color: var(--pink-2); }
  .bundle p { margin-top: 20px; color: rgba(250,245,239,.72); font-size: 15px; max-width: 440px; line-height: 1.65; }
  .bundle ul { list-style: none; padding: 0; margin: 28px 0 32px; display: grid; gap: 10px; }
  .bundle ul li {
    font-size: 14px; color: rgba(250,245,239,.85);
    display: flex; gap: 12px; align-items: center;
  }
  .bundle ul li::before {
    content: ""; width: 14px; height: 1px; background: var(--pink-2); display: inline-block;
  }
  .bundle-price {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 28px;
  }
  .bundle-price .now { font-family: var(--serif); font-style: italic; font-size: 56px; color: var(--cream); line-height: 1; }
  .bundle-price .was { font-family: var(--serif); font-size: 22px; color: var(--ink-3); text-decoration: line-through; }
  .bundle-price .save {
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
    background: var(--rose); color: var(--cream);
    padding: 4px 10px; border-radius: 3px; text-transform: uppercase;
  }
  .bundle .btn-primary { background: var(--cream); color: var(--ink); }
  .bundle .btn-primary:hover { background: var(--pink-2); }

  /* ---------- reviews ---------- */
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .review {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 32px 28px;
    position: relative;
    transition: transform .3s, box-shadow .3s;
  }
  .review:hover { transform: translateY(-3px); box-shadow: 0 18px 40px rgba(61,46,42,.06); }
  .review .stars {
    color: var(--rose); font-size: 14px; letter-spacing: .15em;
  }
  .review p {
    font-family: var(--serif);
    font-size: 19px; font-style: italic; font-weight: 400;
    color: var(--ink); line-height: 1.45;
    margin: 14px 0 22px;
  }
  .review .who {
    display: flex; align-items: center; gap: 12px;
    font-size: 12px; letter-spacing: .04em;
    color: var(--ink-2);
  }
  .review .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--pink-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; color: var(--rose);
    font-size: 16px;
  }
  .review .who strong { color: var(--ink); font-weight: 600; }
  .review .who span { color: var(--ink-3); font-size: 11px; }

  /* ---------- newsletter ---------- */
  .news {
    text-align: center;
    background:
      radial-gradient(ellipse 50% 80% at 50% 0%, var(--pink-1) 0%, transparent 70%),
      var(--cream);
    border-top: 1px solid var(--line);
    padding: 110px 56px 120px;
  }
  .news .scribble {
    font-family: var(--hand);
    color: var(--rose);
    font-size: 28px;
    margin-bottom: 12px;
    transform: rotate(-3deg);
    display: inline-block;
  }
  .news h2 {
    font-family: var(--serif); font-weight: 300;
    font-size: clamp(40px, 5vw, 64px);
    line-height: 1.02; letter-spacing: -0.01em;
    max-width: 720px; margin: 0 auto;
  }
  .news h2 em { font-style: italic; color: var(--rose); }
  .news p { color: var(--ink-2); margin: 22px auto 36px; max-width: 480px; font-size: 16px; }
  .news form {
    display: flex; max-width: 500px; margin: 0 auto;
    background: var(--cream);
    border: 1px solid var(--ink);
    border-radius: 999px;
    padding: 6px;
    gap: 6px;
  }
  .news input {
    flex: 1; border: 0; background: transparent;
    font: inherit; font-size: 14px;
    padding: 0 18px; color: var(--ink);
    outline: none;
  }
  .news input::placeholder { color: var(--ink-3); }
  .news button.btn-primary { padding: 12px 22px; }
  .news .small {
    margin-top: 18px; font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ink-3);
  }

  /* ---------- footer ---------- */
  footer {
    background: var(--ink);
    color: var(--cream);
    padding: 80px 56px 32px;
  }
  .foot-grid {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 56px;
    border-bottom: 1px solid rgba(250,245,239,.12);
  }
  .foot-grid h4 {
    font-family: var(--mono); font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: rgba(250,245,239,.55);
    margin-bottom: 18px;
  }
  .foot-grid ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; font-size: 14px; }
  .foot-grid ul a { color: rgba(250,245,239,.85); }
  .foot-grid ul a:hover { color: var(--pink-2); }
  .foot-brand {
    font-family: var(--serif); font-style: italic; font-size: 44px; line-height: 1;
  }
  .foot-brand .dot { color: var(--rose); }

            <li><a href="#">Términos</a></li>
            <li><a href="#">Privacidad</a></li>
          </ul>
        </div>
      </div>
      <div className="foot-bottom">
        <span>© 2026 agustina reynoso · recetas de autora</span>
        <span>HECHO CON HARINA &amp; AMOR EN JUSTINIANO POSSE.</span>
      </div>
    </footer>
  );
}

function App() {
  const [cart, setCart] = useState([]);
  const [saved, setSaved] = useState([]);
  const [toast, setToast] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    document.body.style.overflow = menuOpen ? "hidden" : "";
  }, [menuOpen]);

  const addToCart = (item) => {
    setCart(c => [...c, item]);
    setToast(`Agregaste "${item.title}" al carrito`);
    setTimeout(() => setToast(""), 2200);
  };
  const toggleSave = (id) => {
    setSaved(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  };

  return (
    <>
      <Topbar />
      <Nav
        cartCount={cart.length}
        menuOpen={menuOpen}
        setMenuOpen={setMenuOpen}
        onCart={() => setToast(cart.length ? `${cart.length} receta${cart.length===1?"":"s"} en tu carrito` : "Tu carrito está vacío")}
      />
      <Hero onAdd={addToCart} />
      <Marquee />
      <Recipes onAdd={addToCart} saved={saved} onSave={toggleSave} />
      <About />
      <Bundle onAdd={addToCart} />
      <Reviews />
      <Footer />
      <div className={`toast ${toast ? "show" : ""}`}>
        <span className="check">✿</span> {toast}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
