<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>agustina reynoso — recetas de autora</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Caveat:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF5EF;
    --cream-2: #F5EEE5;
    --pink-1: #F7E2DE;
    --pink-2: #F3D2CC;
    --pink-3: #E9B6AE;
    --rose:   #C97B7B;
    --beige:  #E8D9C5;
    --beige-d:#C9B5A0;
    --ink:    #3D2E2A;
    --ink-2:  #6B5953;
    --ink-3:  #9A8880;
    --line:   #E7DBCE;
    --serif:  "Cormorant Garamond", "Times New Roman", serif;
    --hand:   "Caveat", cursive;
    --sans:   "Manrope", -apple-system, system-ui, sans-serif;
    --mono:   "JetBrains Mono", ui-monospace, monospace;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  img { max-width: 100%; display: block; }
  h1,h2,h3,h4 { margin: 0; font-weight: 400; }

  /* ---------- top bar ---------- */
  .topbar {
    background: var(--ink);
    color: var(--cream);
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    text-align: center;
    padding: 10px 16px;
    font-weight: 500;
  }
  .topbar span { opacity: .7; margin: 0 14px; }

  /* ---------- nav ---------- */
  nav.head {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 22px 56px;
    border-bottom: 1px solid var(--line);
    background: var(--cream);
    position: sticky; top: 0; z-index: 30;
  }
  nav.head ul {
    list-style: none; padding: 0; margin: 0;
    display: flex; gap: 34px;
    font-size: 13px; letter-spacing: .04em;
  }
  nav.head ul.right { justify-content: flex-end; align-items: center; }
  nav.head a { color: var(--ink-2); transition: color .2s; }
  nav.head a:hover { color: var(--rose); }
  .brand {
    font-family: var(--serif);
    font-size: 30px;
    font-style: italic;
    letter-spacing: .01em;
    color: var(--ink);
    line-height: 1;
  }
  .brand .dot { color: var(--rose); }
  .nav-cart {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px; letter-spacing: .08em;
    background: var(--cream);
    transition: background .2s, border-color .2s;
  }
  .nav-cart:hover { background: var(--pink-1); border-color: var(--pink-2); }
  .nav-cart .count {
    background: var(--rose); color: var(--cream);
    border-radius: 999px; min-width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; padding: 0 5px;
  }
  .user-menu {
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--line);
  }
  .login-btn {
    font-size: 13px; color: var(--ink-2);
    padding: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    transition: all .2s;
  }
  .login-btn:hover { background: var(--pink-1); border-color: var(--pink-2); color: var(--ink); }

  /* ---------- hero ---------- */
  .hero {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    padding: 72px 56px 80px;
    align-items: center;
    background:
      radial-gradient(ellipse 60% 70% at 85% 20%, var(--pink-1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 10% 90%, var(--cream-2) 0%, transparent 60%),
      var(--cream);
  }
  .hero-left { padding: 0; }
  .hero-right { padding: 0; }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .hero-eyebrow .pip {
    width: 6px; height: 6px; border-radius: 50%; background: var(--rose);
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(56px, 6.4vw, 92px);
    line-height: 0.98;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic;
    color: var(--rose);
    font-weight: 400;
  }
  .hero h1 .scribble {
    font-family: var(--hand);
    font-style: normal;
    color: var(--rose);
    font-size: .68em;
    display: inline-block;
    transform: rotate(-3deg) translateY(-.04em);
    margin-left: .1em;
  }
  .hero p.lede {
    margin-top: 26px;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-2);
    max-width: 460px;
  }
  .hero-cta {
    margin-top: 36px;
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform .25s, background .25s, color .25s, border-color .25s;
  }
  .btn-primary {
    background: var(--ink); color: var(--cream);
  }
  .btn-primary:hover { background: var(--rose); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink);
  }
  .btn-ghost:hover { background: var(--ink); color: var(--cream); }
  .btn .arr { transition: transform .25s; }
  .btn:hover .arr { transform: translateX(4px); }

  .hero-stats {
    margin-top: 56px;
    display: grid; grid-template-columns: repeat(3, auto);
    gap: 44px;
    font-family: var(--serif);
  }
  .hero-stats .num {
    font-size: 36px; font-style: italic; color: var(--ink); line-height: 1;
  }
  .hero-stats .lbl {
    font-family: var(--sans);
    font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-3);
    margin-top: 8px;
  }

  /* ---------- hero photo ---------- */
  .hero-photo {
    position: relative;
    aspect-ratio: 4/5;
    border-radius: 8px;
    overflow: visible;
  }
  .photo {
    width: 100%; height: 100%;
    border-radius: 6px;
    background-image:
      repeating-linear-gradient(135deg, rgba(201,123,123,.08) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--pink-1) 0%, var(--pink-2) 100%);
    border: 1px solid var(--pink-2);
    display: flex; align-items: flex-end; justify-content: flex-start;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .photo .label {
    position: relative; z-index: 2;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--rose);
    background: rgba(255,255,255,.7);
    padding: 6px 10px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }
  .photo.beige {
    background-image:
      repeating-linear-gradient(135deg, rgba(61,46,42,.05) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--beige) 0%, #DBC8B0 100%);
    border-color: var(--beige-d);
  }
  .photo.beige .label { color: var(--ink); }
  .photo.cream {
    background-image:
      repeating-linear-gradient(135deg, rgba(61,46,42,.04) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    border-color: var(--line);
  }
  .photo.cream .label { color: var(--ink-2); }
  .photo.rose {
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.18) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, var(--pink-3) 0%, var(--rose) 100%);
    border-color: var(--rose);
  }
  .photo.rose .label { color: #fff; background: rgba(0,0,0,.18); }
  .photo.has-images {
    background-image: none;
    border: none;
  }
  .photo-slider {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    display: flex; width: 100%; height: 100%;
    overflow: hidden; border-radius: 6px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .photo-slider img {
    flex: 0 0 100%; width: 100%; height: 100%;
    object-fit: cover; scroll-snap-align: start;
  }
  .photo-dots {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 5px;
    pointer-events: none;
    z-index: 2;
  }
  .photo-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,.5);
  }
  .photo-dots span.active { background: #fff; }
  
  .photo-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,.7); backdrop-filter: blur(4px);
    border: 1px solid rgba(0,0,0,.05);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); font-size: 18px; cursor: pointer;
    z-index: 10; opacity: 0; pointer-events: none;
    transition: opacity .2s, background .2s, color .2s;
  }
  .photo:hover .photo-arrow { opacity: 1; pointer-events: auto; }
  .photo-arrow:hover { background: #fff; color: var(--rose); }
  .photo-arrow.prev { left: 10px; }
  .photo-arrow.next { right: 10px; }

  video::-webkit-media-controls { display: none !important; }

  .hero-tag {
    position: absolute;
    top: 28px; left: -28px;
    font-family: var(--hand);
    font-size: 30px;
    color: var(--ink);
    transform: rotate(-6deg);
    background: var(--cream);
    padding: 4px 14px;
    border-radius: 4px;
    box-shadow: 0 1px 0 var(--line);
  }
  .hero-badge {
    position: absolute;
    bottom: -32px; right: -22px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--cream);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.15;
    transform: rotate(-8deg);
    animation: spin 22s linear infinite;
  }
  .hero-badge span { display: block; font-family: var(--sans); font-style: normal; font-size: 9px; letter-spacing: .25em; text-transform: uppercase; opacity: .7; margin-top: 4px; }
  @keyframes spin {
    from { transform: rotate(-8deg); }
    50%  { transform: rotate(8deg); }
    to   { transform: rotate(-8deg); }
  }

  /* ---------- marquee ---------- */
  .marquee {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: var(--cream-2);
    overflow: hidden;
    padding: 18px 0;
    font-family: var(--serif);
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    white-space: nowrap;
  }
  .marquee-track {
    display: inline-block;
    animation: scroll 40s linear infinite;
  }
  .marquee-track span { margin: 0 28px; }
  .marquee-track .star { color: var(--rose); font-style: normal; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ---------- section header ---------- */
  section { padding: 96px 56px; }
  .sec-head {
    display: flex; align-items: end; justify-content: space-between;
    margin-bottom: 48px; gap: 40px;
    flex-wrap: wrap;
  }
  .sec-head-left { display: flex; flex-direction: column; }
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 10px 18px; background: var(--cream);
    transition: border-color .2s, box-shadow .2s;
    min-width: 240px;
  }
  .search-bar:focus-within { border-color: var(--pink-3); box-shadow: 0 0 0 3px rgba(201,123,123,.1); }
  .search-bar input {
    border: none; background: none; outline: none;
    font-family: var(--sans); font-size: 13px; color: var(--ink);
    width: 100%;
  }
  .search-bar input::placeholder { color: var(--ink-3); }
  .search-bar span { color: var(--ink-3); font-size: 14px; }
  .see-more-btn {
    display: flex; justify-content: center; margin-top: 48px;
  }
  .see-more-btn .btn {
    background: var(--cream-2); color: var(--ink);
    border: 1px solid var(--line); padding: 14px 36px;
    font-size: 13px; letter-spacing: .06em;
  }
  .see-more-btn .btn:hover { background: var(--pink-1); border-color: var(--pink-2); }
  .sec-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .sec-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(40px, 4.4vw, 60px);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .sec-title em { font-style: italic; color: var(--rose); }
  .sec-link {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 4px;
    display: inline-flex; gap: 8px; align-items: center;
  }
  .sec-link:hover { color: var(--rose); border-color: var(--rose); }

  /* ---------- categories ---------- */
  .chips {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 36px;
  }
  .chip {
    padding: 9px 18px; border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--cream);
    font-size: 12px; letter-spacing: .06em;
    color: var(--ink-2);
    transition: all .2s;
  }
  .chip:hover { border-color: var(--rose); color: var(--rose); }
  .chip.active {
    background: var(--ink); color: var(--cream); border-color: var(--ink);
  }
  .chip .ct { opacity: .55; margin-left: 6px; font-size: 11px; }
  
  .tags-filter { display: flex; align-items: center; gap: 12px; margin-top: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .tags-label { font-size: 11px; color: var(--ink-2); letter-spacing: .05em; text-transform: uppercase; }
  .tags-chips { margin-bottom: 0; }
  .tag-chip { border-style: dashed; }
  .tag-chip.active { border-style: solid; background: var(--rose); border-color: var(--rose); color: var(--cream); }
  .clear-tags { background: var(--ink-2); color: var(--cream); border-color: var(--ink-2); font-size: 11px; padding: 7px 14px; }
  .clear-tags:hover { background: var(--ink); border-color: var(--ink); }
  
  .results-count { font-size: 13px; color: var(--ink-2); margin-bottom: 24px; letter-spacing: .03em; }

  /* ---------- recipes grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px 28px;
  }
  .card {
    cursor: pointer;
    position: relative;
  }
  .card-photo-wrap {
    position: relative;
    aspect-ratio: 4/5;
    overflow: hidden;
    border-radius: 6px;
  }
  .card-photo-wrap .photo {
    transition: transform .8s ease;
  }
  .card:hover .card-photo-wrap .photo { transform: scale(1.04); }
  .card-add {
    position: absolute; right: 14px; bottom: 14px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--cream);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 6px 20px rgba(61,46,42,.12);
    opacity: 0; transform: translateY(8px);
    transition: opacity .25s, transform .25s, background .2s, color .2s;
  }
  .card:hover .card-add { opacity: 1; transform: translateY(0); }
  .card-add:hover { background: var(--rose); color: var(--cream); }
  .card-bookmark {
    position: absolute; top: 14px; right: 14px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--ink-2);
    transition: color .2s, background .2s;
  }
  .card-bookmark:hover { color: var(--rose); }
  .card-bookmark.saved { color: var(--rose); background: var(--cream); }
  .card-tag {
    position: absolute; top: 14px; left: 14px;
    font-family: var(--mono);
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    background: rgba(255,255,255,.85); backdrop-filter: blur(4px);
    color: var(--ink); padding: 5px 9px; border-radius: 3px;
  }
  .card-tag.new { background: var(--rose); color: var(--cream); }
  .card-meta {
    margin-top: 16px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px;
  }
  .card-title {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.005em;
  }
  .card-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: .04em;
    display: flex; gap: 10px; align-items: center;
  }
  .card-sub .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-3); display: inline-block; }
  .card-price {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink);
    font-style: italic;
    white-space: nowrap;
  }

  /* ---------- about ---------- */
  .about {
    background: var(--cream-2);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .about-grid {
    display: grid;
    grid-template-columns: .9fr 1.1fr;
    gap: 72px;
    align-items: center;
  }
  .about-photo {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 6px;
  }
  .about-photo .photo { border-radius: 6px; }
  .about-stamp {
    position: absolute; bottom: -22px; left: -22px;
    background: var(--cream); border: 1px solid var(--line);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: var(--hand);
    font-size: 24px;
    color: var(--ink);
    box-shadow: 0 8px 20px rgba(61,46,42,.06);
  }
  .about h2 {
    font-family: var(--serif); font-weight: 300;
    font-size: clamp(40px, 4.4vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .about h2 em { font-style: italic; color: var(--rose); }
  .about p {
    margin-top: 24px;
    font-size: 16px; color: var(--ink-2); line-height: 1.7;
    max-width: 500px;
  }
  .signature {
    margin-top: 28px;
    font-family: var(--hand);
    font-size: 38px;
    color: var(--ink);
  }

  /* ---------- bundle / featured ---------- */
  #combo {
    display: flex; flex-direction: column; gap: 48px;
  }
  .bundle {
    background: var(--ink);
    color: var(--cream);
    border-radius: 12px;
    padding: 64px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 56px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .bundle::after {
    content: "";
    position: absolute; right: -120px; top: -120px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(247,226,222,.15) 0%, transparent 70%);
  }
  .bundle .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .25em;
    color: var(--pink-2);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .bundle h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(36px, 4.2vw, 56px);
    line-height: 1.02;
    letter-spacing: -0.01em;
  }
  .bundle h2 em { font-style: italic; color: var(--pink-2); }
  .bundle p { margin-top: 20px; color: rgba(250,245,239,.72); font-size: 15px; max-width: 440px; line-height: 1.65; }
  .bundle ul { list-style: none; padding: 0; margin: 28px 0 32px; display: grid; gap: 10px; }
  .bundle ul li {
    font-size: 14px; color: rgba(250,245,239,.85);
    display: flex; gap: 12px; align-items: center;
  }
  .bundle ul li::before {
    content: ""; width: 14px; height: 1px; background: var(--pink-2); display: inline-block;
  }
  .bundle-price {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 28px;
  }
  .bundle-price .now { font-family: var(--serif); font-style: italic; font-size: 56px; color: var(--cream); line-height: 1; }
  .bundle-price .was { font-family: var(--serif); font-size: 22px; color: var(--ink-3); text-decoration: line-through; }
  .bundle-price .save {

<script type="text/babel">

const { useState, useMemo, useEffect } = React;

const API_BASE = '';
const ARS = n => "$" + (n || 0).toLocaleString("es-AR");

/* ---------- API helpers ---------- */
async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* ---------- Components ---------- */
function Photo({ tone="pink", label, className="", images=[] }) {
  const [activeIdx, setActiveIdx] = useState(0);
  const sliderId = useMemo(() => Math.random().toString(36).slice(2), []);

  useEffect(() => { setActiveIdx(0); }, [images]);

  const scrollTo = (i) => {
    const el = document.getElementById('slider-' + sliderId);
    if (!el) return;
    el.scrollTo({ left: el.clientWidth * i, behavior: 'smooth' });
    setActiveIdx(i);
  };

  const scrollNext = (e) => {
    if (e) e.stopPropagation();
    const nextIdx = activeIdx === images.length - 1 ? 0 : activeIdx + 1;
    scrollTo(nextIdx);
  };

  const scrollPrev = (e) => {
    if (e) e.stopPropagation();
    const prevIdx = activeIdx === 0 ? images.length - 1 : activeIdx - 1;
    scrollTo(prevIdx);
  };

  const handleTouch = (e) => {
    if (images.length < 2) return;
    const el = e.currentTarget;
    const now = e.touches[0];
    el._startX = now.clientX;
    el._startLeft = el.scrollLeft;
  };

  const handleTouchEnd = (e) => {
    if (images.length < 2) return;
    const el = e.currentTarget;
    const dx = el._startX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) {
      scrollTo(dx > 0 ? Math.min(activeIdx + 1, images.length - 1) : Math.max(activeIdx - 1, 0));
    }
  };

  if (images.length > 0) {
    return (
      <div className={`photo ${className} has-images`} style={{position: 'relative'}}>
        <div
          className="photo-slider"
          id={'slider-' + sliderId}
          onTouchStart={handleTouch}
          onTouchEnd={handleTouchEnd}
          onScroll={() => {
            const el = document.getElementById('slider-' + sliderId);
            if (!el) return;
            const idx = Math.round(el.scrollLeft / el.clientWidth);
            setActiveIdx(idx);
          }}
        >
          {images.map((url, i) => {
            const isVideo = url.match(/\.(mp4|webm|mov|quicktime)(\?.*)?$/i);
            return isVideo ? (
              <video key={i} src={url} playsInline autoPlay muted loop style={{flex: '0 0 100%', width: '100%', height: '100%', objectFit: 'cover', scrollSnapAlign: 'start'}} />
            ) : (
              <img key={i} src={url} alt={label || ''} loading="lazy" />
            );
          })}
        </div>
        {images.length > 1 && (
          <>
            <button type="button" className="photo-arrow prev" onClick={scrollPrev} aria-label="Anterior">‹</button>
            <button type="button" className="photo-arrow next" onClick={scrollNext} aria-label="Siguiente">›</button>
            <div className="photo-dots" style={{pointerEvents: 'auto'}}>
              {images.map((_, i) => (
                <button
                  type="button"
                  key={i}
                  className={i === activeIdx ? 'active' : ''}
                  onClick={(e) => { e.stopPropagation(); scrollTo(i); }}
                  style={{width: 5, height: 5, borderRadius: '50%', background: i === activeIdx ? '#fff' : 'rgba(255,255,255,.5)', border: 0, cursor: 'pointer', padding: 0}}
                />
              ))}
            </div>
          </>
        )}
        <span className="label">{label}</span>
      </div>
    );
  }
  return (
    <div className={`photo ${tone} ${className}`}>
      <span className="label">{label}</span>
    </div>
  );
}

function Recipes({ recipes, categories, onAdd, saved, onSave, onSelectRecipe, user, activeCategory, onCategoryChange }) {
  const [searchQuery, setSearchQuery] = useState("");
  const [showAll, setShowAll] = useState(false);
  const INITIAL_SHOW = 6;

  const counts = useMemo(() => {
    const c = { Todas: recipes.length };
    recipes.forEach(r => { c[r.category] = (c[r.category]||0)+1; });
    return c;
  }, [recipes]);

  const list = useMemo(() => {
    let filtered = activeCategory === "Todas" ? recipes : recipes.filter(r => r.category === activeCategory);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(r =>
        r.title.toLowerCase().includes(q) ||
        r.category.toLowerCase().includes(q) ||
        (r.description && r.description.toLowerCase().includes(q))
      );
    }
    return filtered;
  }, [recipes, activeCategory, searchQuery]);

  const displayed = showAll ? list : list.slice(0, INITIAL_SHOW);
  const hasMore = list.length > INITIAL_SHOW && !showAll;

  return (
    <section id="recetas">
      <div className="sec-head">
        <div className="sec-head-left">
          <div className="sec-eyebrow">— el recetario</div>
          <h2 className="sec-title">Recetas <em>destacadas</em></h2>
        </div>
        <div className="search-bar">
          <span>🔍</span>
          <input
            type="text"
            placeholder="Buscar recetas..."
            value={searchQuery}
            onChange={e => { setSearchQuery(e.target.value); setShowAll(false); }}
          />
        </div>
      </div>

      <div className="chips">
        {categories.map(c => (
          <button
            key={c}
            className={`chip ${activeCategory===c ? "active" : ""}`}
            onClick={() => { onCategoryChange(c); setShowAll(false); }}
          >
            {c}<span className="ct">({counts[c]||0})</span>
          </button>
        ))}
      </div>
      <div className="results-count">
        {list.length} {list.length === 1 ? 'receta' : 'recetas'}
        {searchQuery && ` para "${searchQuery}"`}
      </div>

      <div className="grid">
        {displayed.map(r => (
          <article className="card" key={r.id} onClick={() => onSelectRecipe(r)}>
              <div className="card-photo-wrap">
                <Photo tone={r.photo_tone} label={r.label} images={r.images || []} />
                <button
                  className={`card-bookmark ${saved.includes(r.id) ? "saved" : ""}`}
                  onClick={(e) => { e.stopPropagation(); onSave(r.id); }}
                  aria-label="guardar"
                >
                  {saved.includes(r.id) ? "♥" : "♡"}
                </button>
                {user?.purchasedRecipes?.includes(r.id) ? (
                  <div className="card-purchased-badge" style={{ position: 'absolute', bottom: '14px', right: '14px', background: 'var(--ink)', color: 'var(--cream)', padding: '6px 12px', borderRadius: '20px', fontSize: '12px', fontWeight: '500' }}>
                    Comprada
                  </div>
                ) : (
                  <button
                    className="card-add"
                    onClick={(e) => { e.stopPropagation(); onAdd(r); }}
                    aria-label="agregar al carrito"
                  >+</button>
                )}
              </div>
            <div className="card-meta">
              <div>
                <h3 className="card-title">{r.title}</h3>
                <div className="card-sub">
                  <span>{r.category}</span>
                  <span className="dot-sep"></span>
                  <span>{r.time}</span>
                  <span className="dot-sep"></span>
                  <span>{r.level}</span>
                </div>
              </div>
              <div className="card-price">{ARS(r.price)}</div>
            </div>

        ))}

      {hasMore && (
        <div className="see-more-btn">

            Ver más ({list.length - INITIAL_SHOW} más) <span>↓</span>

  );
}

function BundleCard({ combo, recipes, onAdd }) {
  const buy = () => {
    const comboRecipes = Array.isArray(combo.recipes) ? combo.recipes : [];
    const recipeDetails = comboRecipes.map(cr => {
      const full = recipes.find(r => r.id === cr.id);
      return { ...cr, images: full?.images || [], photo_tone: full?.photo_tone || 'pink', label: full?.label || cr.title };
    });
    onAdd({
      id: combo.id,
      title: combo.title,
      price: combo.final_price,
      type: 'combo',
      recipes: combo.recipes,
      images: recipeDetails.length > 0 && recipeDetails[0].images.length > 0
        ? [recipeDetails[0].images[0]]
        : [],
      photo_tone: recipeDetails.length > 0 ? recipeDetails[0].photo_tone : 'pink',
      label: `${recipeDetails.length} recetas`
    });
  };

  const features = Array.isArray(combo.features) ? combo.features : [];
  const comboRecipes = Array.isArray(combo.recipes) ? combo.recipes : [];
  const recipeDetails = comboRecipes.map(cr => {
    const full = recipes.find(r => r.id === cr.id);
    return {
      ...cr,
      images: full?.images || [],
      photo_tone: full?.photo_tone || 'pink',
      label: full?.label || cr.title
    };
  });

  const count = recipeDetails.length;
  let gridCols = '1fr';
  if (count === 2) gridCols = '1fr 1fr';
  else if (count >= 3) gridCols = '1fr 1fr';

  const tones = ['pink', 'beige', 'cream', 'rose'];

  return (
    <div className="bundle">
      <div>
        <div className="eyebrow">— {combo.eyebrow || 'combo de temporada'}</div>
        <h2 dangerouslySetInnerHTML={{__html: combo.title || ''}} />
        {combo.description && <p>{combo.description}</p>}
        {features.length > 0 && (
          <ul>
            {features.map((f, i) => <li key={i}>{f}</li>)}
          </ul>
        )}
        <div className="bundle-price">
          <span className="now">{ARS(combo.final_price)}</span>
          {combo.original_price > combo.final_price && (
            <span className="was">{ARS(combo.original_price)}</span>
          )}
          {combo.discount_percent > 0 && (
            <span className="save">−{combo.discount_percent}%</span>
          )}
        </div>
        <button className="btn btn-primary" onClick={buy}>Llevar el combo <span className="arr">→</span></button>
      </div>
      <div>
        {count > 0 ? (
          <div style={{display:"grid", gridTemplateColumns: gridCols, gap: 12, gridAutoRows: '1fr'}}>
            {recipeDetails.map((r, i) => (
              <div key={r.id} style={{borderRadius: 8, overflow: 'hidden', aspectRatio: '1/1'}}>
                <Photo tone={r.photo_tone || tones[i % 4]} label={r.label} images={r.images || []} className="bundle-recipe-photo" />
              </div>
            ))}
          </div>
        ) : (
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap: 12, aspectRatio: "1/1"}}>
            <div className="photo pink" style={{borderRadius: 8}}><span className="label">receta</span></div>
            <div className="photo beige" style={{borderRadius: 8}}><span className="label">receta</span></div>
          </div>
        )}
      </div>
    </div>
  );
}

function AuthModal({ open, onClose }) {
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [rememberMe, setRememberMe] = useState(true);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if (open) {
      setTab('login');
      setEmail(''); setPassword(''); setConfirmPassword('');
      setError(''); setSuccess('');
    }
  }, [open]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(''); setSuccess('');

    if (tab === 'login') {
      if (!email || !password) { setError('Completá todos los campos'); return; }
      setLoading(true);
      try {
        const data = await api('/api/auth/login-email', {
          method: 'POST',
          body: JSON.stringify({ email, password, rememberMe })
        });
        if (data.success) { window.location.reload(); }
      } catch (e) {
        setError(e.message || 'Error al iniciar sesión');
      } finally { setLoading(false); }
    } else if (tab === 'register') {
      if (!email || !password || !confirmPassword) { setError('Completá todos los campos'); return; }
      if (password !== confirmPassword) { setError('Las contraseñas no coinciden'); return; }
      if (password.length < 8) { setError('La contraseña debe tener al menos 8 caracteres'); return; }
      setLoading(true);
      try {
        const data = await api('/api/auth/register-email', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        if (data.success) { window.location.reload(); }
      } catch (e) {
        setError(e.message || 'Error al crear la cuenta');
      } finally { setLoading(false); }
    } else if (tab === 'forgot') {
      if (!email) { setError('Ingresá tu email'); return; }
      setLoading(true);
      try {
        await api('/api/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email })
        });
        setSuccess('Revisá tu correo para reiniciar la contraseña');
      } catch (e) {
        setError(e.message || 'Error al enviar el link');
      } finally { setLoading(false); }
    }
  };

  const handleGoogle = () => {
    window.location.href = '/api/auth/google';
  };

  if (!open) return null;

  return (
    <>
      <div className="auth-overlay open" onClick={onClose} />
      <div className="auth-modal open">
        <div className="auth-header">
          <button className="auth-close" onClick={onClose}>×</button>
          {tab === 'forgot' ? (
            <>
              <h2>Reiniciar contraseña</h2>
              <p>Recibí un link en tu correo</p>
            </>
          ) : (
            <>
              <h2>{tab === 'login' ? 'Iniciar sesión' : 'Crear cuenta'}</h2>
              <p>{tab === 'login' ? 'Bienvenida de nuevo ✿' : 'Llevá recetas a tu cocina'}</p>
            </>
          )}
        </div>
        <div className="auth-body">
          {error && <div className="auth-error">{error}</div>}
          {success && <div className="auth-success">{success}</div>}
          {tab !== 'forgot' && (
            <>
              <div className="auth-tabs">
                <div className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => { setTab('login'); setError(''); }}>Iniciar sesión</div>
                <div className={`auth-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => { setTab('register'); setError(''); }}>Crear cuenta</div>
              </div>
              <form onSubmit={handleSubmit}>
                <div className="auth-field">
                  <label>Email</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="tu@email.com" autoComplete="email" />
                </div>
                <div className="auth-field">
                  <label>Contraseña</label>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" autoComplete={tab === 'login' ? 'current-password' : 'new-password'} />
                </div>
                {tab === 'register' && (
                  <div className="auth-field">
                    <label>Confirmar contraseña</label>
                    <input type="password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} placeholder="••••••••" autoComplete="new-password" />
                  </div>
                )}
                {tab === 'login' && (
                  <div className="auth-remember">
                    <input type="checkbox" id="remember" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />
                    <label htmlFor="remember" style={{margin: 0, textTransform: 'none', letterSpacing: 'normal', fontSize: 13}}>Recordarme</label>
                  </div>
                )}
                <button type="submit" className="auth-submit" disabled={loading}>
                  {loading ? 'Cargando...' : tab === 'login' ? 'Iniciar sesión' : 'Crear cuenta'}
                </button>
              </form>
              {tab === 'login' && (
                <div className="auth-forgot">
                  <span className="auth-link" onClick={() => { setTab('forgot'); setError(''); }}>¿Olvidaste tu contraseña?</span>
                </div>
              )}
              <div className="auth-divider">o</div>
              <button className="auth-google" onClick={handleGoogle}>
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                Continuar con Google
              </button>
              {tab === 'login' ? (
                <span className="auth-link" onClick={() => { setTab('register'); setError(''); }}>¿No tenés cuenta? Registrate</span>
              ) : (
                <span className="auth-link" onClick={() => { setTab('login'); setError(''); }}>Ya tenés cuenta? Iniciá sesión</span>
              )}
            </>
          )}
          {tab === 'forgot' && (
            <>
              <form onSubmit={handleSubmit}>
                <div className="auth-field">
                  <label>Email</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="tu@email.com" autoComplete="email" />
                </div>
                <button type="submit" className="auth-submit" disabled={loading}>
                  {loading ? 'Enviando...' : 'Enviar link'}
                </button>
              </form>
              <span className="auth-link" onClick={() => { setTab('login'); setError(''); }}>Volver al login</span>
            </>
          )}
        </div>
      </div>
    </>
  );
}

                  </div>
                )}
                <div className="cart-item-info">
                  <div className="cart-item-title">{item.title}</div>
                  <div className="cart-item-price">{ARS(item.price)}</div>
                </div>
                <button className="cart-item-remove" onClick={() => onRemove(idx)}>×</button>
              </div>
            ))
          )}
        </div>
        {items.length > 0 && (
          <div className="cart-footer">
            <div className="cart-total">
              <span>Total ({items.length} items)</span>
              <strong>{ARS(total)}</strong>
            </div>
            <button className="cart-checkout" onClick={onCheckout} disabled={checkingOut}>
              {checkingOut ? 'Procesando...' : 'Finalizar compra →'}
            </button>
          </div>
        )}
      </div>
    </>
  );
}

/* ---------- Main App ---------- */
function App() {
  const [recipes, setRecipes] = useState([]);
  const [categories, setCategories] = useState(["Todas"]);
  const [cart, setCart] = useState([]);
  const [saved, setSaved] = useState([]);
  const [toast, setToast] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);
  const [cartOpen, setCartOpen] = useState(false);
  const [user, setUser] = useState(null);
  const [checkingOut, setCheckingOut] = useState(false);
  const [authOpen, setAuthOpen] = useState(false);
  const [accountOpen, setAccountOpen] = useState(false);
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [heroImageUrl, setHeroImageUrl] = useState(null);
  const [activeCategory, setActiveCategory] = useState("Todas");

  // Fetch settings for hero image
  useEffect(() => {
    api('/api/settings')
      .then(data => {
        setHeroImageUrl(data.settings?.hero_image_url || '/uploads/tarta.jpg');
      })
      .catch(() => {
        setHeroImageUrl('/uploads/tarta.jpg');
      });
  }, []);

  // Persist cart
  useEffect(() => {
    localStorage.setItem('cart', JSON.stringify(cart));
  }, [cart]);

  // Persist saved
  useEffect(() => {
    localStorage.setItem('saved', JSON.stringify(saved));
  }, [saved]);

  // Check auth
  useEffect(() => {
    api('/api/auth/me')
      .then(data => {
        if (data.user) setUser(data.user);
      })
      .catch(() => {});
  }, []);

  // Fetch settings for hero image
  useEffect(() => {
    api('/api/settings')
      .then(data => {
        if (data.settings?.hero_image_url) {
          setHeroImageUrl(data.settings.hero_image_url);
        }
      })
      .catch(() => {});
  }, []);

  // Fetch recipes
  useEffect(() => {
    api('/api/recipes')
      .then(data => {
        setRecipes(data.recipes || []);
        // Extract unique categories, excluding 'Sin categoría' from chips
        const cats = [...new Set((data.recipes || []).map(r => r.category))].filter(c => c !== 'Sin categoría');
        setCategories(["Todas", ...cats]);
      })
      .catch(err => {
        console.error('Failed to load recipes:', err);
        setToast("Error cargando recetas");
      });
  }, []);

  useEffect(() => {
    document.body.style.overflow = menuOpen ? "hidden" : "";
  }, [menuOpen]);

  useEffect(() => {
    document.body.style.overflow = cartOpen ? "hidden" : "";
  }, [cartOpen]);

  useEffect(() => {
    document.body.style.overflow = accountOpen ? "hidden" : "";
  }, [accountOpen]);

  const addToCart = (item) => {
    // Check if already purchased
    if (user?.purchasedRecipes?.includes(Number(item.id))) {
      setToast(`Ya compraste "${item.title}"`);
      setTimeout(() => setToast(""), 2200);
      return;
    }
    // Check if already in cart
    if (cart.find(c => c.id === item.id)) {
      setToast(`"${item.title}" ya está en el carrito`);
      setTimeout(() => setToast(""), 2200);
      return;
    }
    setCart(c => [...c, item]);
    setToast(`Agregaste "${item.title}" al carrito`);
    setTimeout(() => setToast(""), 2200);
  };

  const removeFromCart = (idx) => {
    setCart(c => c.filter((_, i) => i !== idx));
  };

  const toggleSave = (id) => {
    setSaved(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  };

  const handleLogin = () => {
    setAuthOpen(true);
  };

  const handleLogout = async () => {
    try {
      await api('/api/auth/logout', { method: 'POST' });
      setUser(null);
      setToast("Sesión cerrada");
      setTimeout(() => setToast(""), 2000);
    } catch (e) {
      console.error('Logout failed:', e);
    }
  };

  const handleAccountLogout = () => {
    setUser(null);
    setToast("Sesión cerrada");
    setTimeout(() => setToast(""), 2000);
  };

  const handleCheckout = async () => {
    if (!user) {
      setToast("Iniciá sesión para comprar ✿");
      setTimeout(() => setToast(""), 3000);
      setAuthOpen(true);
      return;
    }

    if (cart.length === 0) return;

    setCheckingOut(true);
    try {
      // Check if cart has a combo (single item with type 'combo')
      const isCombo = cart.length === 1 && cart[0].type === 'combo';
      const payload = isCombo
        ? { combo_id: cart[0].id }
        : { items: cart };

      const data = await api('/api/payments/create', {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      if (data.initPoint) {
        window.location.href = data.initPoint;
      } else {
        throw new Error('No payment URL');
      }
    } catch (err) {
      console.error('Checkout failed:', err);
      setToast("Error al procesar el pago. Intentá de nuevo.");
      setTimeout(() => setToast(""), 3000);
    } finally {
      setCheckingOut(false);
    }
  };

  return (
    <>
      <Topbar />
      <Nav
        cartCount={cart.length}
        menuOpen={menuOpen}
        setMenuOpen={setMenuOpen}
        onCart={() => setCartOpen(true)}
        user={user}
        onLogin={handleLogin}
        onLogout={handleLogout}
      />
      <Hero onAdd={addToCart} heroImageUrl={heroImageUrl} />
      <Marquee />
        <Recipes 
          recipes={recipes} 
          categories={categories}
          onAdd={addToCart} 
          saved={saved} 
          onSave={toggleSave}
          onSelectRecipe={setSelectedRecipe}
          user={user}
          activeCategory={activeCategory}
          onCategoryChange={setActiveCategory}
        />
      <About />
      <Bundles onAdd={addToCart} />
      <MyRecipes user={user} setToast={setToast} />
      <FAQ />
      <Footer categories={categories} onLogin={handleLogin} onNavigateCategory={(cat) => {
        setActiveCategory(cat);
        document.getElementById('recetas')?.scrollIntoView({ behavior: 'smooth' });
      }} user={user} onAccountOpen={() => setAccountOpen(true)} />
      <CartDrawer
        open={cartOpen}
        onClose={() => setCartOpen(false)}
        items={cart}
        onRemove={removeFromCart}
        onCheckout={handleCheckout}
        checkingOut={checkingOut}
      />
      <AuthModal open={authOpen} onClose={() => setAuthOpen(false)} />
        <RecipeModal 
          recipe={selectedRecipe} 
          onClose={() => setSelectedRecipe(null)} 
          onAdd={addToCart} 
          user={user}
        />
      <AccountModal 
        open={accountOpen} 
        onClose={() => setAccountOpen(false)} 
        user={user} 
        onLogout={handleAccountLogout} 
      />
      <div className={`toast ${toast ? "show" : ""}`}>
        <span className="check">✿</span> {toast}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
