<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reiniciar contraseña — agustina reynoso</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Caveat:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF5EF;
    --cream-2: #F5EEE5;
    --pink-1: #F7E2DE;
    --pink-2: #F3D2CC;
    --pink-3: #E9B6AE;
    --rose:   #C97B7B;
    --beige:  #E8D9C5;
    --beige-d:#C9B5A0;
    --ink:    #3D2E2A;
    --ink-2:  #6B5953;
    --ink-3:  #9A8880;
    --line:   #E7DBCE;
    --serif:  "Cormorant Garamond", "Times New Roman", serif;
    --hand:   "Caveat", cursive;
    --sans:   "Manrope", -apple-system, system-ui, sans-serif;
    --mono:   "JetBrains Mono", ui-monospace, monospace;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  .topbar {
    background: var(--ink);
    color: var(--cream);
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    text-align: center;
    padding: 10px 16px;
    font-weight: 500;
  }

  .reset-container {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  .reset-card {
    width: 100%; max-width: 400px;
    background: var(--cream-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 40px 36px;
    text-align: center;
  }
  .reset-card h1 {
    font-family: var(--serif);
    font-size: 32px; font-weight: 400;
    margin-bottom: 10px;
  }
  .reset-card p {
    color: var(--ink-2);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 16px; text-align: left; }
  .field label {
    display: block; font-size: 11px; letter-spacing: .06em;
    text-transform: uppercase; color: var(--ink-2); margin-bottom: 8px;
  }
  .field input {
    width: 100%; padding: 13px 16px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--cream); color: var(--ink);
    font-family: var(--sans); font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--pink-3); }
  .submit {
    width: 100%; padding: 15px;
    background: var(--ink); color: var(--cream);
    border-radius: 999px; font-size: 13px;
    letter-spacing: .06em; font-weight: 500;
    text-transform: uppercase; cursor: pointer;
    transition: all .25s; margin-top: 8px;
    border: none;
  }
  .submit:hover { background: var(--rose); transform: translateY(-1px); }
  .submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .message {
    padding: 12px 16px; border-radius: 8px;
    font-size: 13px; margin-bottom: 20px;
    text-align: center;
  }
  .message.error { background: #FFEBEE; color: #C62828; }
  .message.success { background: #E8F5E9; color: #2E7D32; }
  .back-link {
    display: block; margin-top: 20px;
    font-size: 13px; color: var(--ink-2);
    cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  }
  .back-link:hover { color: var(--rose); }
  .brand-link {
    font-family: var(--serif);
    font-size: 24px; font-style: italic;
    color: var(--ink);
    display: block; margin-bottom: 32px;
  }
  .brand-link span { color: var(--rose); }
</style>
</head>
<body>
<div class="topbar">envío inmediato por mail · recetas paso a paso · +12 mil pasteleras en casa</div>

<div class="reset-container">
  <div class="reset-card">
    <a href="/" class="brand-link">agustina<span>.</span></a>
    <div id="content">
      <h1>Nueva contraseña</h1>
      <p> Elegí una nueva contraseña para tu cuenta </p>
      <div id="message"></div>
      <form id="reset-form">
        <div class="field">
          <label>Contraseña nueva</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" minlength="8" />
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <button type="submit" class="submit" id="submit-btn">Guardar contraseña</button>
      </form>
      <span class="back-link" onclick="history.back()">← Volver</span>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  document.getElementById('content').innerHTML = `
    <h1>Link inválido</h1>
    <p>Este link de reinicio de contraseña no es válido o expiró.</p>
    <a href="/" class="back-link" style="display:block;margin-top:0">Volver al inicio</a>
  `;
} else {
  document.getElementById('reset-form').onsubmit = async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const msg = document.getElementById('message');
    const btn = document.getElementById('submit-btn');

    msg.className = 'message';
    msg.textContent = '';

    if (!password || !confirm) { msg.textContent = 'Completá todos los campos'; msg.classList.add('error'); return; }
    if (password.length < 8) { msg.textContent = 'La contraseña debe tener al menos 8 caracteres'; msg.classList.add('error'); return; }
    if (password !== confirm) { msg.textContent = 'Las contraseñas no coinciden'; msg.classList.add('error'); return; }

    btn.disabled = true; btn.textContent = 'Guardando...';

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('content').innerHTML = `
          <h1>Contraseña actualizada</h1>
          <p>Ya podés iniciar sesión con tu nueva contraseña ✿</p>
          <div class="message success">¡Listo! Redirigiéndote...</div>
          <a href="/" class="submit" style="display:block;text-align:center;text-decoration:none;">Ir al inicio</a>
        `;
        setTimeout(() => window.location.href = '/', 2000);
      } else {
        msg.textContent = data.error || 'Error al actualizar la contraseña';
        msg.classList.add('error');
        btn.disabled = false; btn.textContent = 'Guardar contraseña';
      }
    } catch (err) {
      msg.textContent = 'Error al conectar con el servidor';
      msg.classList.add('error');
      btn.disabled = false; btn.textContent = 'Guardar contraseña';
    }
  };
}
</script>
</body>
</html>
