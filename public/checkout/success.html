<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pago Exitoso · Agustina Reynoso</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF5EF; --ink: #3D2E2A; --rose: #C97B7B;
    --serif: "Cormorant Garamond", serif; --sans: "Manrope", sans-serif;
  }
  body {
    margin: 0; background: var(--cream); color: var(--ink);
    font-family: var(--sans); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px;
  }
  .container { max-width: 480px; }
  .check { font-size: 64px; color: #2E7D32; margin-bottom: 24px; }
  h1 { font-family: var(--serif); font-weight: 300; font-size: 42px; margin: 0 0 16px; }
  p { font-size: 16px; color: #6B5953; line-height: 1.7; margin-bottom: 32px; }
  a.btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 28px; border-radius: 999px;
    background: var(--ink); color: var(--cream);
    font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    font-weight: 500; text-decoration: none;
    transition: background .25s;
  }
  a.btn:hover { background: var(--rose); }
</style>
</head>
<body>
  <div class="container">
    <div class="check">✓</div>
    <h1>¡Pago exitoso!</h1>
    <p>
      Gracias por tu compra. Vas a recibir un email con tus recetas en los próximos minutos.<br/>
      También podés verlas en la sección "Mis recetas" de tu cuenta.
    </p>
    <a href="/" class="btn">Volver al inicio →</a>
  </div>
</body>
</html>
